title: "What is the edge protocol between nodes and E routers on a single LAN?"
content: |
  The MVP scope is nodes + E router on a single LAN — proving the edge
  protocol and user experience before tackling multi-hop networking.

  The E router runs alongside a node for same-LAN setup between two
  machines. This is the simplest deployment: two machines, one router,
  one or more tmux sessions published.

  Key unknowns: wire format, session discovery/announcement, connection
  handshake, timeslice tick rate, frame structure. How does a console
  find and connect to a published tmux session through the E router?
