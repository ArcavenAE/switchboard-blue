# Example 05 — four-nodes-one-svtn
# The target single-SVTN topology: one router, four access nodes each
# hosting a different live program (three of them full TUIs), one console.
# Run:  docker compose up --build --exit-code-from operator
#
# The operator asserts everything the alpha implements; the SVTN-level flow
# (create SVTN, register node/console keys, list + attach sessions across
# the network) is encoded as gated checks that flip when the
# access→router→console connector ships.

x-node: &node
  build: ../_shared
  init: true
  tty: true
  depends_on:
    init:
      condition: service_completed_successfully
  volumes:
    - etc:/etc/switchboard:ro
    - run:/run/switchboard
    - ./:/example:ro

services:
  init:
    build: ../_shared
    command: ["bash", "/example/init.sh"]
    volumes:
      - keys:/keys
      - etc:/etc/switchboard
      - ./:/example:ro

  router:
    build: ../_shared
    command: ["switchboard", "router", "--config", "/etc/switchboard/router.yaml"]
    depends_on:
      init:
        condition: service_completed_successfully
    volumes:
      - etc:/etc/switchboard:ro
      - run:/run/switchboard
    healthcheck:
      test: ["CMD", "test", "-S", "/run/switchboard/router.sock"]
      interval: 1s
      timeout: 2s
      retries: 10

  node1:
    <<: *node
    command: ["bash", "/example/node-entry.sh", "1", "top"]
    healthcheck: &node1check
      test: ["CMD", "bash", "-c", "test -S /run/switchboard/node1.sock && tmux has-session -t node1"]
      interval: 1s
      timeout: 2s
      retries: 15

  node2:
    <<: *node
    command: ["bash", "/example/node-entry.sh", "2", "htop"]
    healthcheck:
      <<: *node1check
      test: ["CMD", "bash", "-c", "test -S /run/switchboard/node2.sock && tmux has-session -t node2"]

  node3:
    <<: *node
    command: ["bash", "/example/node-entry.sh", "3", "watch -n1 date"]
    healthcheck:
      <<: *node1check
      test: ["CMD", "bash", "-c", "test -S /run/switchboard/node3.sock && tmux has-session -t node3"]

  node4:
    <<: *node
    command: ["bash", "/example/node-entry.sh", "4", "vmstat 1"]
    healthcheck:
      <<: *node1check
      test: ["CMD", "bash", "-c", "test -S /run/switchboard/node4.sock && tmux has-session -t node4"]

  console:
    build: ../_shared
    command: ["switchboard", "console", "--config", "/etc/switchboard/console.yaml"]
    depends_on:
      init:
        condition: service_completed_successfully
    volumes:
      - etc:/etc/switchboard:ro
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/9091"]
      interval: 1s
      timeout: 2s
      retries: 10

  operator:
    build: ../_shared
    command: ["bash", "/example/assert.sh"]
    depends_on:
      router:
        condition: service_healthy
      node1:
        condition: service_healthy
      node2:
        condition: service_healthy
      node3:
        condition: service_healthy
      node4:
        condition: service_healthy
      console:
        condition: service_healthy
    volumes:
      - keys:/keys:ro
      - run:/run/switchboard
      - ./:/example:ro

volumes:
  keys:
  etc:
  run:
