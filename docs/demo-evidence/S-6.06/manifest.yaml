known_issues:
  - id: DEMO-ISSUE-001
    ac: AC-005
    severity: medium
    description: |
      TestE2E_AdminExpire_ServerRejectsTTL* tests return E-ADM-009 instead of E-CFG-001
      because the tests use a freshly-generated caller key that is not registered in the
      test SVTNManager. The AC-006 authority gate fires before AC-005 TTL validation.
      Unit-level evidence (TestBuildAdminHandlers_KeyExpire_NegativeTTL and
      TestBuildAdminHandlers_KeyExpire_MissingAfterField) demonstrates the AC-005
      behavior correctly. The e2e test wiring needs a fix: the TTL rejection tests must
      use the SVTNManager bootstrap/control key as the authenticated caller.

