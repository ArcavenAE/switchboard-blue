# Factory Policies
# Governance rules enforced by spec-steward across all .factory/ artifacts.
# Each policy has: id, title, severity (HIGH/MED/LOW), scope, rule, and rationale.

policies:
  - id: POL-001
    title: changelog-completeness
    severity: MED
    scope: all spec artifacts
    rule: >
      Every version-frontmatter bump (version: "X.Y.Z" field change) MUST be
      accompanied by a matching changelog row or modified: entry in the same
      commit. A commit that increments the version field without a corresponding
      human-readable changelog entry is a policy violation.
    rationale: >
      Pass-6 Lens-3 (F-P5L3R-01 through F-P5L3R-05) found five HIGH findings
      where spec artifacts had been bumped to a new version but lacked the
      required changelog row documenting what changed. This creates audit gaps
      and makes it impossible to reconstruct the traceability chain from version
      number alone. The policy formalizes the existing convention so spec-steward
      can flag violations during governance sweeps.
    enforcement: >
      spec-steward checks for version field vs. changelog row parity during every
      governance pass. Violations are reported as HIGH or MED findings (matching
      this policy's severity) and must be remediated before the next phase gate.
    examples:
      violation: "version bumped from 1.4 to 1.5 in frontmatter, but no '| 1.5 | ...' row in the Changelog table"
      compliant: "version bumped from 1.4 to 1.5 AND '| 1.5 | 2026-07-01 | description of change |' row added in same commit"

  - id: POL-002
    title: story-index-row-sync
    severity: MED
    scope: stories/*.md ↔ stories/STORY-INDEX.md
    rule: >
      When a story's frontmatter version: is bumped, the STORY-INDEX row's status cell
      (draft (vX.Y)) MUST be updated in the same fix-burst or before the next per-story
      adversarial pass.
    rationale: >
      Row-cell stale-ness in STORY-INDEX creates silent divergence between authoritative
      story artifact and orchestration-facing index. Ruling-11 §5 formalized this as a
      class-2 traceability defect.
    enforcement: >
      Adversary Lens-3 checks row-cell match; missing sync = MED finding.
    examples:

  - id: POL-004
    title: no-binary-demo-artifacts
    severity: MED
    scope: docs/demo-evidence/**
    rule: >
      Rendered VHS or screenshot binaries (.gif, .webm, .mp4, .png, .jpg, .jpeg)
      MUST NOT be committed under docs/demo-evidence/. The authoritative source
      of truth for a demo is the .tape script plus evidence-report.md; the
      rendered artifact is a build product regenerable on demand via
      `vhs docs/demo-evidence/<STORY-ID>/AC-NNN.tape`.
    rationale: >
      62 tracked binaries (~12.3 MB) accumulated across Wave-6 and Phase-3
      demo-recorder backfill despite the demos providing no diff-review value —
      reviewers cannot tell what changed between two GIFs; a modified .tape
      script tells them exactly. The vsdd-factory:demo-recorder agent's default
      renders both .gif and .webm hardcoded (agents/demo-recorder.md L54-55,
      L97, L109); no environment variable, project-manifest field, or policy
      surface disables it. Project convention overrides the plugin default.
    enforcement: >
      .gitignore excludes docs/demo-evidence/**/*.{gif,webm,mp4,png,jpg,jpeg}
      so accidental commits are prevented at the mechanical layer. Orchestrators
      dispatching demo-recorder MUST include the verbatim instruction from
      docs/DEMO-EVIDENCE-POLICY.md ("Repo policy: do not render or commit
      .gif/.webm/.mp4/.png. Commit .tape scripts and evidence-report.md only.")
      in the task prompt. Spec-steward flags any diff that introduces binaries
      under docs/demo-evidence/ as a MED finding.
    examples:
      violation: "docs/demo-evidence/S-5.02/AC-001-*.gif committed alongside .tape script"
      compliant: "docs/demo-evidence/S-5.02/AC-001-*.tape + evidence-report.md committed; rendered .gif/.webm ignored by git"

  - id: POL-005
    title: adversary-dispatch-integrity
    severity: HIGH
    scope: all adversarial/evaluation dispatches (per-story BC-5.39.001 passes, wave-gate Perimeter-2, phase-level P-passes, holdout evaluation)
    rule: >
      Every adversary dispatch MUST embed a verification tuple in the dispatch
      prompt: {repo path, branch, expected HEAD SHA at dispatch time, artifact
      IDs + versions under review}. The dispatched agent MUST, as its first
      action, verify its observed `git rev-parse HEAD` and artifact versions
      against the tuple. On mismatch: ABORT the pass and report the mismatch
      as the pass result (severity: dispatch-integrity); never proceed on
      divergent state.
    rationale: >
      Perimeter-2 (wave-gate) adversary dispatch lacked a structural HEAD-SHA
      verification tuple. A SHA mismatch between dispatch-time state and the
      adversary's actual checkout was caught opportunistically by one
      thorough pass; a less-thorough pass would have silently reviewed stale
      state (silent-false-green risk). Filed upstream as
      drbothen/vsdd-factory#448 (Batch 28). STATE.md Open Drift Items row
      WAVE-GATE-DISPATCH-INTEGRITY tracks local mitigation via the
      pipeline-hardening cycle (IP-C1-03, 2026-07-12).
    enforcement: >
      Orchestrator MUST include the verification tuple in every
      adversarial/evaluation dispatch prompt (per-story passes, wave-gate
      Perimeter-2, phase-level P-passes, holdout evaluation). The dispatched
      agent's first action is `git rev-parse HEAD` plus an artifact-version
      check against the tuple; a mismatch aborts the pass and is reported as
      a dispatch-integrity finding rather than a normal pass result.
      Spec-steward / session-review flags any pass report lacking tuple
      verification confirmation as a HIGH finding.
    examples:
      violation: "Adversary dispatched for wave-gate Perimeter-2 with no HEAD SHA in the prompt; adversary silently reviews whatever happens to be checked out, diverging from dispatch-time intent with no signal"
      compliant: "Dispatch prompt includes {repo: switchboard-blue, branch: develop, expected_head: <sha>, artifacts: [VP-042 v3, BC-5.39.001 v2]}; adversary's first action confirms `git rev-parse HEAD` matches before proceeding; on mismatch, the pass aborts and reports the SHA divergence as its result"

